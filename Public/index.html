<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RapidChat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <h1>RapidChat</h1>

    <div id="authView" class="card">
      <div class="grid2">
        <div>
          <h2>Sign Up</h2>
          <form id="signupForm">
            <input id="suUser" placeholder="username" autocomplete="username" />
            <input id="suPass" placeholder="password" type="password" autocomplete="new-password" />
            <button type="submit">Sign Up</button>
          </form>
          <p id="signupMsg" class="msg"></p>
        </div>

        <div>
          <h2>Login</h2>
          <form id="loginForm">
            <input id="liUser" placeholder="username" autocomplete="username" />
            <input id="liPass" placeholder="password" type="password" autocomplete="current-password" />
            <button type="submit">Login</button>
          </form>
          <p id="loginMsg" class="msg"></p>
        </div>
      </div>
    </div>

    <div id="chatView" class="card hidden">
      <div class="topbar">
        <div>
          <div class="small">Logged in as</div>
          <div id="who" class="who"></div>
        </div>
        <button id="logoutBtn" class="secondary">Logout</button>
      </div>

      <div class="gridChat">
        <div class="panel">
          <h3>Room</h3>
          <div class="row">
            <input id="roomInput" placeholder="room name" />
            <button id="joinBtn">Join</button>
            <button id="leaveBtn" class="secondary">Leave</button>
          </div>

          <h3>Members</h3>
          <ul id="members" class="list"></ul>
        </div>

        <div class="chat">
          <div id="roomTitle" class="roomTitle">No room joined</div>
          <div id="messages" class="messages"></div>

          <form id="msgForm" class="row">
            <input id="msgInput" placeholder="type a message" />
            <button type="submit">Send</button>
          </form>

          <p id="chatMsg" class="msg"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
